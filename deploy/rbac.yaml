apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubevirt-online-resize-helper
  namespace: {{ .Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubevirt-online-resize-helper
  namespace: {{ .Namespace }}
rules:
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    verbs: [get, list, watch, patch]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list]
  - apiGroups: [""]
    resources: [pods/exec]
    verbs: [create]
  - apiGroups: [kubevirt.io]
    resources: [virtualmachineinstances]
    verbs: [get, list, watch, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubevirt-online-resize-helper
  namespace: {{ .Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubevirt-online-resize-helper
subjects:
  - kind: ServiceAccount
    name: kubevirt-online-resize-helper
    namespace: {{ .Namespace }}
